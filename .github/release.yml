changelog:
  exclude:
    labels:
      - skip-changelog
  categories:
    - title: Breaking Changes
      labels:
        - breaking
        - breaking-change
    - title: Features
      labels:
        - enhancement
        - feature
    - title: Fixes
      labels:
        - bug
        - fix
    - title: CI and Tooling
      labels:
        - ci
        - dependencies
        - tooling
    - title: Other Changes
      labels:
        - "*"
